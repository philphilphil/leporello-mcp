name: leporello

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    restart: unless-stopped
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    environment:
      - PORT=3000
      - SERVICE_NAME=web
      - LEPORELLO_ENV=production
    networks:
      - gateway
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=gateway"
      - "traefik.http.routers.leporello.rule=Host(`leporello.app`)"
      - "traefik.http.routers.leporello.entrypoints=websecure"
      - "traefik.http.routers.leporello.tls.certresolver=myresolver"
      - "traefik.http.services.leporello.loadbalancer.server.port=3000"

  scraper:
    build:
      context: .
      dockerfile: Dockerfile.scraper
    restart: "no"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    environment:
      - SERVICE_NAME=scraper
      - LEPORELLO_ENV=production
    profiles:
      - scrape

networks:
  gateway:
    external: true
