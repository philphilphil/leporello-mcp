name: leporello

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    restart: unless-stopped
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    environment:
      - PORT=3000
      - SERVICE_NAME=web
    networks:
      - gateway
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=gateway"
      - "traefik.http.routers.leporello.rule=Host(`leporello.app`)"
      - "traefik.http.routers.leporello.entrypoints=websecure"
      - "traefik.http.routers.leporello.tls.certresolver=myresolver"
      - "traefik.http.services.leporello.loadbalancer.server.port=3000"

# The scraper is a one-shot batch job — it lives in docker-compose.scrape.yml
# under its own project name so an exited run container is never folded into
# this (always-running) stack's health by Komodo et al.

networks:
  gateway:
    external: true
